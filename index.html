<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelated Dollhouse</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Press+Start+2P">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #87CEEB;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            image-rendering: pixelated;
        }

        .dollhouse {
            width: 500px;
            height: 500px;
            border: 12px solid #8B4513;
            background: #D2B48C;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 4px;
            padding: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .room {
            border: 6px solid #654321;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .room:hover {
            transform: scale(1.05);
        }

        .bedroom { background: #FFB6C1; }
        .kitchen { background: #FFDAB9; }
        .bathroom { background: #E0FFFF; }
        .living-room { background: #EEE8AA; }

        .room h2 {
            font-size: 12px;
            margin-bottom: 10px;
            text-align: center;
        }

        .furniture {
            background: #FFF;
            border: 3px solid #000;
            padding: 5px 10px;
            margin: 3px;
            cursor: pointer;
            font-size: 8px;
            transition: background-color 0.2s;
        }

        .furniture:hover {
            background-color: #FFD700;
        }
    </style>
</head>
<body>
    <div class="dollhouse">
        <div class="room bedroom">
            <h2>🛏️ Bedroom</h2>
            <button class="furniture">Bed</button>
            <button class="furniture">Dresser</button>
            <button class="furniture">Lamp</button>
        </div>
        <div class="room kitchen">
            <h2>🍳 Kitchen</h2>
            <button class="furniture">Table</button>
            <button class="furniture">Stove</button>
        </div>
        <div class="room bathroom">
            <h2>🚿 Bathroom</h2>
            <button class="furniture">Bathtub</button>
            <button class="furniture">Toilet</button>
        </div>
        <div class="room living-room">
            <h2>🪑 Living Room</h2>
            <button class="furniture">Sofa</button>
            <button class="furniture">Shelf</button>
            <button class="furniture">Plant</button>
        </div>
    </div>
</body>
</html>
