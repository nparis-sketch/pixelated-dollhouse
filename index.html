<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelated Dollhouse</title>
    <style>
        body {
            background-color: #cce7ff;
            overflow: hidden;
        }
        .dollhouse {
            position: relative;
            width: 400px;
            height: 300px;
            margin: 50px auto;
            border: 2px solid #000;
            background-color: #fff;
        }
        .roof {
            width: 0;
            height: 0;
            border-left: 200px solid transparent;
            border-right: 200px solid transparent;
            border-bottom: 100px solid red;
            position: absolute;
            top: -100px;
            left: 0;
        }
        .room {
            width: 180px;
            height: 120px;
            position: absolute;
            border: 1px solid #000;
            background-color: #f0f0f0;
        }
        .bedroom { top: 40px; left: 10px; background-color: #ffebcd; }
        .kitchen { top: 40px; left: 210px; background-color: #ffe4b5; }
        .bathroom { top: 160px; left: 10px; background-color: #add8e6; }
        .living-room { top: 160px; left: 210px; background-color: #98fb98; }
        .furniture {
            position: relative;
            width: 30px;
            height: 30px;
            margin: 5px;
            display: inline-block;
        }
        .bed { background-color: #deb887; }
        .stove { background-color: #8b4513; }
        .bathtub { background-color: #f0e68c; }
        .sofa { background-color: #cd5c5c; }
        .pixel-person {
            width: 20px;
            height: 20px;
            background-color: #ff69b4;
            position: absolute;
            bottom: 0;
            animation: walk 5s linear infinite;
        }
        @keyframes walk {
            0% { left: 0; }
            50% { left: 360px; }
            100% { left: 0; }
        }
    </style>
</head>
<body>
    <div class="dollhouse">
        <div class="roof"></div>
        <div class="room bedroom">
            <div class="furniture bed"></div>
            <div class="furniture dresser"></div>
        </div>
        <div class="room kitchen">
            <div class="furniture stove"></div>
            <div class="furniture table"></div>
        </div>
        <div class="room bathroom">
            <div class="furniture bathtub"></div>
            <div class="furniture toilet"></div>
        </div>
        <div class="room living-room">
            <div class="furniture sofa"></div>
            <div class="furniture shelf"></div>
            <div class="furniture plant"></div>
        </div>
        <div class="pixel-person"></div>
    </div>
</body>
</html>
